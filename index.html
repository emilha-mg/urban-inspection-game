<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vistoria Urbana</title>

    <link rel="stylesheet" href="css/styles.css">
    <script src="js/script.js" defer></script>
</head>

<body>
    <main class="container">
        <header class="cabecalho">
            <h1>Vistoria Urbana 🔎</h1>
            <p>
                Encontre as irregularidades e ajude a cuidar da cidade.
            </p>
        </header>

        <section class="cartao" id="areaInicio">
            <h2>Iniciar partida</h2>

            <p>
                Digite seu nome para começar a vistoria.
            </p>

            <label for="nomeJogador">Nome do jogador:</label>
            <input type="text" id="nomeJogador" name="nomeJogador" placeholder="Digite seu nome" autocomplete="off">

            <button type="button" id="botaoJogar">
                Jogar
            </button>

            <p class="aviso-temporario oculto" id="mensagemInicio" aria-live="polite"></p>
        </section>

        <section class="cartao oculto" id="areaJogo">
            <div class="painel">
                <div class="linha-status">
                    <p>
                        Rodada:
                        <span id="rodadaAtual"></span>/15
                    </p>

                    <p>
                        Nível:
                        <span id="nivelAtual"></span>
                    </p>

                    <p>
                        Pontuação:
                        <span id="pontuacaoAtual"></span>
                    </p>
                </div>

                <div class="tempo-destaque" id="caixaTempo" aria-live="polite">
                    ⏱️ Tempo:
                    <span id="tempoAtual"></span>s
                </div>
            </div>

            <div class="orientacao">
                <h2>Missão do fiscal</h2>
                <p id="textoOrientacao"></p>
            </div>

            <div class="controles">
                <button type="button" id="botaoLupa">
                    🔎 Lupa de Fiscalização
                </button>

                <button type="button" id="botaoMaisTempo">
                    ⏱️ Mais tempo
                </button>
            </div>

            <div class="aviso-temporario oculto" id="avisoJogo" aria-live="polite"></div>

            <div class="grid-jogo" id="gridJogo" aria-label="Grade do jogo"></div>
        </section>

        <section class="cartao oculto" id="areaResultado">
            <h2>Resultado final</h2>

            <p id="resumoResultado"></p>

            <div class="ranking">
                <h3>Ranking</h3>
                <p>
                    Melhores pontuações:
                </p>

                <ol id="listaRanking"></ol>
            </div>

            <button type="button" id="botaoJogarNovamente">
                Jogar novamente
            </button>
        </section>
    </main>
</body>

</html>
